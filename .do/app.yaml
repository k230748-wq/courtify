name: courtify

services:
  - name: backend
    source_dir: backend
    github:
      repo: MuhammadMehroz786/Courtify.pk
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    run_command: gunicorn config.wsgi:application --bind 0.0.0.0:8080 --workers 2
    environment_slug: python
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    routes:
      - path: /api
      - path: /admin
    envs:
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DEBUG
        value: "False"
        scope: RUN_TIME
      - key: ALLOWED_HOSTS
        value: ".ondigitalocean.app,localhost"
        scope: RUN_TIME
      - key: CORS_ALLOWED_ORIGINS
        value: ".ondigitalocean.app"
        scope: RUN_TIME
      - key: DB_NAME
        value: ${courtify-db.DATABASE}
        scope: RUN_TIME
      - key: DB_USER
        value: ${courtify-db.USERNAME}
        scope: RUN_TIME
      - key: DB_PASSWORD
        value: ${courtify-db.PASSWORD}
        type: SECRET
        scope: RUN_TIME
      - key: DB_HOST
        value: ${courtify-db.HOSTNAME}
        scope: RUN_TIME
      - key: DB_PORT
        value: ${courtify-db.PORT}
        scope: RUN_TIME
      - key: AIRTABLE_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: AIRTABLE_BASE_ID
        value: "appsT6PJO16aYV5Mv"
        scope: RUN_TIME
      - key: AIRTABLE_TABLE_NAME
        value: "Courtify Waitlist"
        scope: RUN_TIME

static_sites:
  - name: frontend
    source_dir: frontend
    github:
      repo: MuhammadMehroz786/Courtify.pk
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    output_dir: dist
    index_document: index.html
    error_document: index.html
    routes:
      - path: /
    envs:
      - key: VITE_BACKEND_URL
        scope: BUILD_TIME

databases:
  - name: courtify-db
    engine: PG
    version: "16"
    size: db-s-dev-database
    num_nodes: 1
